services:
  - type: web
    name: conectarte
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && gunicorn conectarte_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: conectarte-db
          property: connectionString
      - key: SUPABASE_S3_ACCESS_KEY
        sync: false
      - key: SUPABASE_S3_SECRET_KEY
        sync: false
      - key: SUPABASE_S3_BUCKET
        value: conectarte-images
      - key: SUPABASE_S3_ENDPOINT
        value: https://qwyhbkivnczcsamljrly.storage.supabase.co/storage/v1/s3
      - key: SUPABASE_S3_REGION
        value: us-east-1

databases:
  - name: conectarte-db
    databaseName: conectarte_db
    plan: free