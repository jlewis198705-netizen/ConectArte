services:
  - type: web
    name: conectarte
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: ./start.sh
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: conectarte-db
          property: connectionString

databases:
  - name: conectarte-db
    databaseName: conectarte_db
    plan: free
