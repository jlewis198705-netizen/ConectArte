{% load static %}

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ConectArte</title>
    <meta name="description" content="Regístrate en ConectArte como artista o cliente para contratar o negociar servicios artísticos.">
    <link rel="icon" type="image/jpeg" href="{% static 'images/conectarte-logo.jpeg' %}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <button id="theme-toggle" class="absolute top-4 right-4 z-50 btn-vintage p-2 text-sm" aria-label="Cambiar tema">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path id="theme-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
    </button>
    <div id="toast-container" class="toast-container"></div>
    <!-- Vintage Card -->
    <div class="relative z-10 card-vintage p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center p-2 bg-tertiary overflow-hidden rounded-2xl border border-vintage mb-3">
                <img src="{% static 'images/conectarte-logo.jpeg' %}" alt="ConectArte" class="w-11 h-11 object-cover">
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-primary">Crear Cuenta</h1>
            <p class="text-sm text-muted mt-2">Únete a la red inteligente de ConectArte</p>
        </div>

        <form id="register-form" method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="first_name" class="block text-xs font-semibold text-secondary uppercase tracking-wider mb-2">Nombre</label>
                    <input type="text" id="first_name" name="first_name" required 
                           class="input-vintage w-full text-sm" 
                           placeholder="ej. Pablo">
                </div>
                <div>
                    <label for="last_name" class="block text-xs font-semibold text-secondary uppercase tracking-wider mb-2">Apellido</label>
                    <input type="text" id="last_name" name="last_name" required 
                           class="input-vintage w-full text-sm" 
                           placeholder="ej. Picasso">
                </div>
            </div>

            <div>
                <label for="username" class="block text-xs font-semibold text-secondary uppercase tracking-wider mb-2">Nombre de usuario</label>
                <input type="text" id="username" name="username" required 
                       class="input-vintage w-full text-sm" 
                       placeholder="ej. pablo_art">
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold text-secondary uppercase tracking-wider mb-2">Contraseña</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required 
                           class="input-vintage w-full text-sm pr-10" 
                           placeholder="Mínimo 8 caracteres">
                    <button type="button" onclick="togglePassword('password')"
                            class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div>
                <label for="password2" class="block text-xs font-semibold text-secondary uppercase tracking-wider mb-2">Confirmar Contraseña</label>
                <div class="relative">
                    <input type="password" id="password2" name="password2" required 
                           class="input-vintage w-full text-sm pr-10" 
                           placeholder="Repite la contraseña">
                    <button type="button" onclick="togglePassword('password2')"
                            class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div>
                <label for="role" class="block text-xs font-semibold text-secondary uppercase tracking-wider mb-2">Tipo de Usuario</label>
                <select id="role" name="role" required
                        class="input-vintage w-full text-sm">
                    <option value="client">Cliente (Deseo contratar servicios artísticos)</option>
                    <option value="artist">Artista (Ofrezco mis servicios artísticos)</option>
                </select>
            </div>

            <button type="submit" id="btn-register" class="btn-vintage w-full py-3 mt-2">
                Crear Cuenta
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            <span class="text-muted">¿Ya tienes cuenta?</span>
            <a href="{% url 'login' %}" class="link-vintage font-semibold ml-1">Inicia sesión</a>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const csrfToken = formData.get('csrfmiddlewaretoken');
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('{% url "register" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                if (response.ok && result.ok) {
                    window.location.href = result.redirect;
                } else {
                    showToast(result.error || 'Ocurrió un error inesperado.', 'error');
                }
            } catch (error) {
                showToast('Error de conexión con el servidor.', 'error');
            }
        });

        function togglePassword(id) {
            const input = document.getElementById(id);
            const btn = input.parentElement.querySelector('button');
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '<svg class=\"w-5 h-5 eye-icon\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88\"/></svg>';
            } else {
                input.type = 'password';
                btn.innerHTML = '<svg class=\"w-5 h-5 eye-icon\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M15 12a3 3 0 11-6 0 3 3 0 016 0z\"/><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z\"/></svg>';
            }
        }

        // Theme toggle
        document.getElementById('theme-toggle')?.addEventListener('click', () => {
            const dark = document.documentElement.dataset.theme === 'dark';
            document.documentElement.dataset.theme = dark ? 'light' : 'dark';
            localStorage.setItem('theme', dark ? 'light' : 'dark');
            updateThemeIcon(!dark);
        });

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.dataset.theme = savedTheme;
        updateThemeIcon(savedTheme === 'dark');

        function updateThemeIcon(isDark) {
            const icon = document.getElementById('theme-icon');
            if (isDark) {
                icon.setAttribute('d', 'M21.752 15.002A9.72 9.72 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z');
            } else {
                icon.setAttribute('d', 'M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z');
            }
        }

        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + (type || 'success');
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }
    </script>
</body>
</html>
