<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ConectArte</title>
    <meta name="description" content="Ingresa a ConectArte, la plataforma de gestión de servicios artísticos automatizada por IA.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <button id="theme-toggle" class="absolute top-4 right-4 p-2 btn-vintage text-sm">🌓</button>
    <!-- Vintage Card -->
    <div class="relative z-10 card-vintage p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center p-3 bg-tertiary rounded-2xl border border-vintage mb-3">
                <!-- Ícono de Paleta de Pintor -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="w-10 h-10">
                    <path d="M32 4C16.536 4 4 16.536 4 32c0 8.284 3.582 15.75 9.314 20.98C14.9 54.4 16.9 55 19 55c3 0 5-2 5-5v-2c0-2.21 1.79-4 4-4h3c8.837 0 16-7.163 16-16 0-13.255-6.716-24-15-24z" fill="var(--accent)"/>
                    <circle cx="18" cy="26" r="4" fill="var(--accent-light)"/>
                    <circle cx="26" cy="16" r="4" fill="#fb923c"/>
                    <circle cx="38" cy="16" r="4" fill="var(--accent-light)"/>
                    <circle cx="46" cy="26" r="4" fill="#34d399"/>
                    <circle cx="28" cy="48" r="3" fill="#e879f9" opacity="0.85"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-primary">ConectArte</h1>
            <p class="text-sm text-muted mt-2">La galería inteligente de servicios artísticos</p>
        </div>

        <div id="error-message" class="hidden p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-xl mb-6 text-center"></div>

        <form id="login-form" method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label for="username" class="block text-xs font-semibold text-secondary uppercase tracking-wider mb-2">Nombre de usuario</label>
                <input type="text" id="username" name="username" required 
                       class="input-vintage w-full" 
                       placeholder="ej. pablo_picasso">
            </div>

            <div class="relative">
                <label for="password" class="block text-xs font-semibold text-secondary uppercase tracking-wider mb-2">Contraseña</label>
                <input type="password" id="password" name="password" required 
                       class="input-vintage w-full pr-12" 
                       placeholder="••••••••">
                <button type="button" id="toggle-password"
                        class="absolute right-3 bottom-2.5 p-1 rounded-lg transition text-muted"
                        tabindex="-1">
                    <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                </button>
            </div>

            <button type="submit" id="btn-login" class="btn-vintage w-full py-3">
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            <span class="text-muted">¿No tienes una cuenta?</span>
            <a href="{% url 'register' %}" class="link-vintage font-semibold ml-1">Regístrate aquí</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errDiv = document.getElementById('error-message');
            errDiv.classList.add('hidden');
            
            const formData = new FormData(this);
            const csrfToken = formData.get('csrfmiddlewaretoken');
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('{% url "login" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                if (response.ok && result.ok) {
                    window.location.href = result.redirect;
                } else {
                    errDiv.textContent = result.error || 'Ocurrió un error inesperado.';
                    errDiv.classList.remove('hidden');
                }
            } catch (error) {
                errDiv.textContent = 'Error de conexión con el servidor.';
                errDiv.classList.remove('hidden');
            }
        });
    </script>
<script>
  // Theme toggle script
  const toggleBtn = document.getElementById('theme-toggle');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      const dark = document.documentElement.dataset.theme === 'dark';
      document.documentElement.dataset.theme = dark ? 'light' : 'dark';
      localStorage.setItem('theme', dark ? 'light' : 'dark');
    });
  }
  // Initialize theme
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.dataset.theme = savedTheme;

  // Password visibility toggle
  document.getElementById('toggle-password')?.addEventListener('click', () => {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>';
    } else {
      pwd.type = 'password';
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
    }
  });
</script>
</body>
</html>
